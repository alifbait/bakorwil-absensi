<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=402, initial-scale=1.0">

  <title>Absensi Masuk</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body{
      font-family:'Inter',sans-serif;
      background:#dfe6ef;
      display:flex;
      justify-content:center;
      margin:0;
      padding:0;
    }

    .mobile{
      width:402px;
      height:874px;
      background:linear-gradient(to bottom,#ffffff,#f8fafc);
      position:relative;
      overflow:hidden;
    }
  </style>
</head>

<body>

<div class="mobile">

  <!-- BACKGROUND -->
  <div class="absolute -top-16 -left-16 w-40 h-40 rounded-full bg-blue-100 opacity-70"></div>

  <div class="absolute top-24 right-7 grid grid-cols-4 gap-2 opacity-40">
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>

    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
  </div>

  <!-- HEADER -->
  <div class="px-5 pt-12 relative z-10">

    <div class="flex items-center justify-between">

      <div class="flex items-center gap-3">

        <button class="w-12 h-12 rounded-2xl bg-white shadow-md flex items-center justify-center text-lg">
          ←
        </button>

        <div>

          <p class="text-slate-400 text-[13px]">
            Absensi Hari Ini
          </p>

          <h2 class="text-slate-900 font-bold text-[24px]">
            Absen Masuk
          </h2>

        </div>

      </div>

      <div class="w-12 h-12 rounded-2xl bg-blue-100 flex items-center justify-center text-blue-600 text-xl">
        📍
      </div>

    </div>

  </div>

  <!-- TIME CARD -->
  <div class="px-5 mt-6 relative z-10">

    <div class="bg-gradient-to-r from-blue-600 to-blue-500 rounded-[30px] p-5 text-white shadow-xl shadow-blue-500/30">

      <p class="text-blue-100 text-[13px] mb-2">
        Waktu Server
      </p>

      <h1 class="text-[42px] font-extrabold leading-none mb-3">
        07:01:22
      </h1>

      <div class="flex items-center justify-between">

        <p class="text-blue-100 text-[14px]">
          Kamis, 21 Mei 2026
        </p>

        <div class="bg-white/20 px-4 py-2 rounded-2xl text-[12px] font-medium">
          Realtime
        </div>

      </div>

    </div>

  </div>

  <!-- GPS STATUS -->
  <div class="px-5 mt-5 relative z-10">

    <div class="bg-blue-50 border border-blue-100 rounded-[26px] p-4 flex items-center gap-4">

      <div class="w-14 h-14 rounded-2xl bg-blue-600 flex items-center justify-center text-white text-xl shadow-md shrink-0">
        📡
      </div>

      <div>

        <h3 class="text-slate-900 font-bold text-[17px]">
          GPS Aktif
        </h3>

        <p class="text-slate-500 text-[13px]">
          Anda berada di area kantor
        </p>

      </div>

    </div>

  </div>

  <!-- CAMERA -->
  <div class="px-5 mt-5 relative z-10">

    <div class="bg-white rounded-[30px] border border-slate-100 shadow-lg p-5">

      <div class="flex items-center justify-between mb-4">

        <div>

          <h3 class="text-slate-900 font-bold text-[20px]">
            Selfie Kamera
          </h3>

          <p class="text-slate-400 text-[13px]">
            Ambil foto untuk absensi
          </p>

        </div>

        <div class="w-12 h-12 rounded-2xl bg-orange-100 flex items-center justify-center text-orange-500 text-xl">
          📷
        </div>

      </div>

      <!-- CAMERA PREVIEW -->
      <div class="bg-slate-100 rounded-[28px] h-[230px] flex flex-col items-center justify-center relative overflow-hidden border border-slate-200">

        <div class="absolute inset-0 bg-gradient-to-b from-blue-50 to-slate-100"></div>

        <div class="relative z-10 w-24 h-24 rounded-full bg-white shadow-md flex items-center justify-center text-5xl mb-4">
          👤
        </div>

        <p class="relative z-10 text-slate-500 text-[14px]">
          Preview Kamera
        </p>

      </div>

      <!-- BUTTON -->
      <button class="w-full mt-5 bg-orange-500 text-white py-4 rounded-2xl font-bold text-[17px] shadow-lg shadow-orange-500/30 flex items-center justify-center gap-3">

        Ambil Selfie

        <span class="text-xl">📸</span>

      </button>

    </div>

  </div>

  <!-- LOCATION -->
  <div class="px-5 mt-5 relative z-10">

    <div class="bg-white rounded-[26px] border border-slate-100 shadow-md p-4 flex items-center gap-4">

      <div class="w-14 h-14 rounded-2xl bg-green-100 flex items-center justify-center text-green-600 text-xl shrink-0">
        ✓
      </div>

      <div>

        <h3 class="text-slate-900 font-bold text-[16px]">
          Bakorwil III Malang
        </h3>

        <p class="text-slate-500 text-[13px]">
          Radius lokasi valid untuk absensi
        </p>

      </div>

    </div>

  </div>

  <!-- SUBMIT -->
  <div class="px-5 mt-5 relative z-10">

    <button class="w-full bg-gradient-to-r from-blue-600 to-blue-500 text-white py-4 rounded-[26px] font-bold text-[18px] shadow-xl shadow-blue-500/30 flex items-center justify-center gap-3">

      Absen Sekarang

      <span class="text-xl">→</span>

    </button>

  </div>

  <!-- FOOTER -->
  <div class="mt-5 text-center relative z-10">
    <p class="text-slate-400 text-[12px]">
      Pastikan wajah terlihat jelas saat selfie
    </p>
  </div>

</div>

</body>
</html>
