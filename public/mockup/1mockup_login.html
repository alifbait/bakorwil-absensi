<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=402, initial-scale=1.0">

  <title>Login - Sistem Absensi</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body{
      font-family:'Inter',sans-serif;
      background:#dfe6ef;
      display:flex;
      justify-content:center;
      margin:0;
      padding:0;
    }

    .mobile{
      width:402px;
      height:874px;
      background:linear-gradient(to bottom,#ffffff,#f8fafc);
      position:relative;
      overflow:hidden;
    }
  </style>
</head>

<body>

<div class="mobile">

  <!-- BACKGROUND -->
  <div class="absolute -top-16 -left-16 w-40 h-40 rounded-full bg-blue-100 opacity-70"></div>

  <div class="absolute top-24 right-7 grid grid-cols-4 gap-2 opacity-40">
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>

    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
  </div>

  <div class="absolute top-48 -right-20 w-40 h-40 rounded-full bg-orange-50 opacity-80"></div>

  <!-- HEADER -->
  <div class="pt-12 px-8 text-center relative z-10">

    <!-- LOGO -->
    <img
      src="assets/img/logo-bakorwil-full.png"
      alt="Logo Bakorwil"
      class="w-44 mx-auto object-contain mb-6"
    />

    <!-- TITLE -->
    <h1 class="text-[42px] leading-[44px] font-extrabold text-slate-900 mb-1">
      Sistem
      <br>
      Absensi
    </h1>

    <p class="text-slate-400 text-[14px]">
      Web Absensi Pemerintahan
    </p>

  </div>

  <!-- LOGIN CARD -->
  <div class="px-5 mt-6 relative z-10">

    <div class="bg-white rounded-[28px] border border-slate-100 shadow-lg p-5">

      <!-- USERNAME -->
      <div class="mb-4">

        <label class="flex items-center gap-3 text-slate-900 font-semibold text-[15px] mb-3">

          <div class="w-10 h-10 rounded-2xl bg-blue-100 flex items-center justify-center text-blue-600">
            👤
          </div>

          NIP / Username

        </label>

        <input
          type="text"
          placeholder="Masukkan NIP atau Username"
          class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-[14px] focus:outline-none focus:ring-4 focus:ring-blue-100"
        />

      </div>

      <!-- PASSWORD -->
      <div>

        <label class="flex items-center gap-3 text-slate-900 font-semibold text-[15px] mb-3">

          <div class="w-10 h-10 rounded-2xl bg-orange-100 flex items-center justify-center text-orange-500">
            🔒
          </div>

          Password

        </label>

        <div class="relative">

          <input
            type="password"
            placeholder="Masukkan Password"
            class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-[14px] focus:outline-none focus:ring-4 focus:ring-blue-100"
          />

          <button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400">
            👁️
          </button>

        </div>

      </div>

      <!-- OPTIONS -->
      <div class="flex items-center justify-between mt-5 mb-6">

        <label class="flex items-center gap-2 text-slate-500 text-[13px]">

          <input type="checkbox" class="w-4 h-4">

          Ingat saya

        </label>

        <a href="#" class="text-blue-600 text-[13px] font-medium">
          Lupa password?
        </a>

      </div>

      <!-- BUTTON -->
      <button class="w-full bg-gradient-to-r from-blue-600 to-blue-500 text-white py-3 rounded-2xl font-bold text-[18px] shadow-lg shadow-blue-500/30 flex items-center justify-center gap-2">

        Masuk

        <span>→</span>

      </button>

    </div>

  </div>

  <!-- INFO -->
  <div class="px-5 mt-5 relative z-10">

    <div class="bg-blue-50 border border-blue-100 rounded-[24px] p-4 flex items-start gap-3">

      <div class="w-14 h-14 rounded-2xl bg-blue-600 text-white flex items-center justify-center text-xl shadow-md shrink-0">
        ✓
      </div>

      <div>

        <h3 class="text-slate-900 font-bold text-[18px] mb-1">
          Sistem Aman
        </h3>

        <p class="text-slate-500 text-[13px] leading-relaxed">
          Aktifkan GPS & kamera sebelum absensi
        </p>

      </div>

    </div>

  </div>

  <!-- FOOTER -->
  <div class="mt-6 text-center relative z-10">
    <p class="text-slate-400 text-[12px]">
      © 2025 Bakorwil III Malang
    </p>
  </div>

  <!-- WAVE -->
  <div class="absolute bottom-0 left-0 w-full overflow-hidden leading-none">

    <svg viewBox="0 0 500 150" preserveAspectRatio="none" class="w-full h-24">

      <path
        d="M0.00,49.98 C149.99,150.00 349.20,-49.98 500.00,49.98 L500.00,150.00 L0.00,150.00 Z"
        fill="#0f5fe8">
      </path>

      <path
        d="M0.00,70.00 C149.99,170.00 349.20,-20.00 500.00,70.00 L500.00,150.00 L0.00,150.00 Z"
        fill="#ff9f43">
      </path>

    </svg>

  </div>

</div>

</body>
</html>
