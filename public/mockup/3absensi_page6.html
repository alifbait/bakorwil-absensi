<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=402, initial-scale=1.0">

  <title>Absen Pulang Berhasil</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body{
      font-family:'Inter',sans-serif;
      background:#dfe6ef;
      display:flex;
      justify-content:center;
      margin:0;
      padding:0;
    }

    .mobile{
      width:402px;
      height:874px;
      background:linear-gradient(to bottom,#ffffff,#f8fafc);
      position:relative;
      overflow:hidden;
    }
  </style>
</head>

<body>

<div class="mobile">

  <!-- BACKGROUND -->
  <div class="absolute -top-20 -left-20 w-52 h-52 rounded-full bg-orange-100 opacity-70"></div>

  <div class="absolute top-24 right-7 grid grid-cols-4 gap-2 opacity-40">
    <span class="w-2 h-2 rounded-full bg-orange-300"></span>
    <span class="w-2 h-2 rounded-full bg-orange-300"></span>
    <span class="w-2 h-2 rounded-full bg-orange-300"></span>
    <span class="w-2 h-2 rounded-full bg-orange-300"></span>

    <span class="w-2 h-2 rounded-full bg-orange-300"></span>
    <span class="w-2 h-2 rounded-full bg-orange-300"></span>
    <span class="w-2 h-2 rounded-full bg-orange-300"></span>
    <span class="w-2 h-2 rounded-full bg-orange-300"></span>
  </div>

  <div class="absolute -bottom-24 -right-24 w-56 h-56 rounded-full bg-blue-100 opacity-70"></div>

  <!-- CONTENT -->
  <div class="relative z-10 h-full flex flex-col items-center justify-center px-6 text-center">

    <!-- SUCCESS -->
    <div class="relative mb-8">

      <div class="w-36 h-36 rounded-full bg-orange-100 flex items-center justify-center shadow-xl shadow-orange-200">

        <div class="w-24 h-24 rounded-full bg-orange-500 flex items-center justify-center text-white text-5xl">
          ✓
        </div>

      </div>

      <div class="absolute -bottom-1 -right-1 bg-blue-600 text-white px-4 py-2 rounded-2xl text-[12px] font-semibold shadow-lg">
        Success
      </div>

    </div>

    <!-- TITLE -->
    <h1 class="text-[34px] leading-tight font-extrabold text-slate-900 mb-3">
      Absen Pulang
      <br>
      Berhasil
    </h1>

    <p class="text-slate-500 text-[15px] leading-relaxed max-w-[280px] mb-8">
      Data absensi pulang berhasil disimpan ke sistem.
    </p>

    <!-- DETAIL CARD -->
    <div class="w-full bg-white rounded-[30px] border border-slate-100 shadow-lg p-5 mb-8">

      <div class="flex items-center justify-between mb-5">

        <div class="text-left">

          <p class="text-slate-400 text-[12px] mb-1">
            Status Kehadiran
          </p>

          <h3 class="text-orange-500 font-bold text-[22px]">
            Selesai
          </h3>

        </div>

        <div class="w-14 h-14 rounded-2xl bg-orange-100 flex items-center justify-center text-orange-500 text-2xl">
          🌇
        </div>

      </div>

      <!-- DETAIL -->
      <div class="space-y-4">

        <div class="flex items-center justify-between">

          <p class="text-slate-400 text-[13px]">
            Jam Masuk
          </p>

          <h4 class="text-slate-900 font-bold text-[15px]">
            07:01
          </h4>

        </div>

        <div class="flex items-center justify-between">

          <p class="text-slate-400 text-[13px]">
            Jam Pulang
          </p>

          <h4 class="text-slate-900 font-bold text-[15px]">
            15:10
          </h4>

        </div>

        <div class="flex items-center justify-between">

          <p class="text-slate-400 text-[13px]">
            Total Kerja
          </p>

          <h4 class="text-blue-600 font-semibold text-[15px]">
            8 Jam 9 Menit
          </h4>

        </div>

        <div class="flex items-center justify-between">

          <p class="text-slate-400 text-[13px]">
            Status
          </p>

          <span class="bg-green-100 text-green-700 px-3 py-1 rounded-xl text-[11px] font-semibold">
            Lengkap
          </span>

        </div>

      </div>

    </div>

    <!-- BUTTON -->
    <button class="w-full bg-gradient-to-r from-blue-600 to-blue-500 text-white py-4 rounded-[26px] font-bold text-[18px] shadow-xl shadow-blue-500/30 flex items-center justify-center gap-3">

      Kembali ke Dashboard

      <span>→</span>

    </button>

  </div>

  <!-- WAVE -->
  <div class="absolute bottom-0 left-0 w-full overflow-hidden leading-none">

    <svg viewBox="0 0 500 150" preserveAspectRatio="none" class="w-full h-24">

      <path
        d="M0.00,49.98 C149.99,150.00 349.20,-49.98 500.00,49.98 L500.00,150.00 L0.00,150.00 Z"
        fill="#0f5fe8">
      </path>

      <path
        d="M0.00,70.00 C149.99,170.00 349.20,-20.00 500.00,70.00 L500.00,150.00 L0.00,150.00 Z"
        fill="#ff9f43">
      </path>

    </svg>

  </div>

</div>

</body>
</html>
