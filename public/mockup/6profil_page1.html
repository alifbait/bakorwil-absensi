<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=402, initial-scale=1.0">

  <title>Profile Saya</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body{
      font-family:'Inter',sans-serif;
      background:#dfe6ef;
      display:flex;
      justify-content:center;
      margin:0;
      padding:0;
    }

    .mobile{
      width:402px;
      height:874px;
      background:linear-gradient(to bottom,#ffffff,#f8fafc);
      position:relative;
      overflow:hidden;
    }
  </style>
</head>

<body>

<div class="mobile">

  <!-- BG -->
  <div class="absolute -top-16 -left-16 w-40 h-40 rounded-full bg-blue-100 opacity-70"></div>

  <div class="absolute top-24 right-7 grid grid-cols-4 gap-2 opacity-40">
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>

    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
  </div>

  <!-- HEADER -->
  <div class="px-5 pt-10 relative z-10">

    <div class="flex items-center gap-3">

      <button class="w-11 h-11 rounded-2xl bg-white shadow-md flex items-center justify-center text-lg">
        ←
      </button>

      <div>

        <p class="text-slate-400 text-[11px]">
          Informasi Akun
        </p>

        <h2 class="text-slate-900 font-bold text-[22px]">
          Profile Saya
        </h2>

      </div>

    </div>

  </div>

  <!-- PROFILE CARD -->
  <div class="px-5 mt-5 relative z-10">

    <div class="bg-gradient-to-r from-blue-600 to-blue-500 rounded-[30px] p-6 text-white shadow-xl shadow-blue-500/20">

      <div class="flex flex-col items-center text-center">

        <!-- PHOTO -->
        <div class="w-28 h-28 rounded-full overflow-hidden border-4 border-white/30 shadow-lg mb-4">

          <img
            src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?q=80&w=1200&auto=format&fit=crop"
            class="w-full h-full object-cover"
          />

        </div>

        <!-- INFO -->
        <h3 class="text-[24px] font-bold">
          Ahmad Rizki
        </h3>

        <p class="text-blue-100 text-[13px] mt-1">
          NIP. 198812012024011001
        </p>

        <!-- BADGE -->
        <div class="bg-white/20 px-4 py-2 rounded-2xl text-[12px] font-semibold mt-4">
          Staff Kepegawaian
        </div>

      </div>

    </div>

  </div>

  <!-- DETAIL -->
  <div class="px-5 mt-5 relative z-10 space-y-4">

    <!-- ITEM -->
    <div class="bg-white rounded-[24px] border border-slate-100 shadow-md p-4 flex items-center justify-between">

      <div class="flex items-center gap-4">

        <div class="w-12 h-12 rounded-2xl bg-blue-100 flex items-center justify-center text-blue-600 text-lg">
          🏢
        </div>

        <div>

          <h3 class="text-slate-900 font-semibold text-[14px]">
            Unit Kerja
          </h3>

          <p class="text-slate-400 text-[12px]">
            Bakorwil III Malang
          </p>

        </div>

      </div>

    </div>

    <!-- ITEM -->
    <div class="bg-white rounded-[24px] border border-slate-100 shadow-md p-4 flex items-center justify-between">

      <div class="flex items-center gap-4">

        <div class="w-12 h-12 rounded-2xl bg-orange-100 flex items-center justify-center text-orange-500 text-lg">
          🔒
        </div>

        <div>

          <h3 class="text-slate-900 font-semibold text-[14px]">
            Ubah Password
          </h3>

          <p class="text-slate-400 text-[12px]">
            Keamanan akun pegawai
          </p>

        </div>

      </div>

      <span class="text-slate-400">
        →
      </span>

    </div>

    <!-- ITEM -->
    <div class="bg-white rounded-[24px] border border-slate-100 shadow-md p-4 flex items-center justify-between">

      <div class="flex items-center gap-4">

        <div class="w-12 h-12 rounded-2xl bg-green-100 flex items-center justify-center text-green-600 text-lg">
          ℹ️
        </div>

        <div>

          <h3 class="text-slate-900 font-semibold text-[14px]">
            Bantuan Sistem
          </h3>

          <p class="text-slate-400 text-[12px]">
            Informasi penggunaan aplikasi
          </p>

        </div>

      </div>

      <span class="text-slate-400">
        →
      </span>

    </div>

  </div>

  <!-- LOGOUT -->
  <div class="px-5 mt-5 relative z-10">

    <button class="w-full bg-red-500 text-white py-4 rounded-[24px] font-bold text-[16px] shadow-xl shadow-red-300/30 flex items-center justify-center gap-3">

      Logout

      <span>↗</span>

    </button>

  </div>

  <!-- WAVE -->
  <div class="absolute bottom-0 left-0 w-full overflow-hidden leading-none">

    <svg viewBox="0 0 500 150" preserveAspectRatio="none" class="w-full h-12">

      <path
        d="M0.00,49.98 C149.99,150.00 349.20,-49.98 500.00,49.98 L500.00,150.00 L0.00,150.00 Z"
        fill="#0f5fe8">
      </path>

      <path
        d="M0.00,70.00 C149.99,170.00 349.20,-20.00 500.00,70.00 L500.00,150.00 L0.00,150.00 Z"
        fill="#ff9f43">
      </path>

    </svg>

  </div>

</div>

</body>
</html>
