<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=402, initial-scale=1.0">

  <title>Preview Absensi</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body{
      font-family:'Inter',sans-serif;
      background:#dfe6ef;
      display:flex;
      justify-content:center;
      margin:0;
      padding:0;
    }

    .mobile{
      width:402px;
      height:874px;
      background:linear-gradient(to bottom,#ffffff,#f8fafc);
      position:relative;
      overflow:hidden;
    }
  </style>
</head>

<body>

<div class="mobile">

  <!-- BACKGROUND -->
  <div class="absolute -top-16 -left-16 w-40 h-40 rounded-full bg-blue-100 opacity-70"></div>

  <div class="absolute top-24 right-7 grid grid-cols-4 gap-2 opacity-40">
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>

    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
  </div>

  <!-- HEADER -->
  <div class="px-5 pt-10 relative z-10">

    <div class="flex items-center justify-between">

      <div class="flex items-center gap-3">

        <button class="w-11 h-11 rounded-2xl bg-white shadow-md flex items-center justify-center text-lg">
          ←
        </button>

        <div>

          <p class="text-slate-400 text-[12px]">
            Preview Absensi
          </p>

          <h2 class="text-slate-900 font-bold text-[22px] leading-tight">
            Konfirmasi
          </h2>

        </div>

      </div>

      <div class="w-11 h-11 rounded-2xl bg-green-100 flex items-center justify-center text-green-600 text-lg">
        ✓
      </div>

    </div>

  </div>

  <!-- PREVIEW CARD -->
  <div class="px-5 mt-5 relative z-10">

    <div class="bg-white rounded-[28px] border border-slate-100 shadow-lg p-5">

      <!-- TITLE -->
      <div class="flex items-center justify-between mb-4">

        <div>

          <h3 class="text-slate-900 font-bold text-[18px]">
            Selfie Preview
          </h3>

          <p class="text-slate-400 text-[12px]">
            Pastikan wajah terlihat jelas
          </p>

        </div>

        <div class="w-11 h-11 rounded-2xl bg-orange-100 flex items-center justify-center text-orange-500">
          📷
        </div>

      </div>

      <!-- PHOTO -->
      <div class="rounded-[24px] overflow-hidden h-[220px] bg-slate-100 relative border border-slate-200">

        <img
          src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?q=80&w=1200&auto=format&fit=crop"
          class="w-full h-full object-cover"
        />

        <div class="absolute top-3 right-3 bg-green-500 text-white px-3 py-1 rounded-xl text-[11px] font-semibold">
          Valid
        </div>

      </div>

      <!-- ACTION BUTTON -->
      <div class="grid grid-cols-2 gap-3 mt-4">

        <button class="bg-slate-100 text-slate-700 py-3 rounded-2xl font-semibold text-[14px]">

          Ambil Lagi

        </button>

        <button class="bg-orange-500 text-white py-3 rounded-2xl font-bold text-[14px] shadow-lg shadow-orange-500/30">

          Gunakan Foto

        </button>

      </div>

    </div>

  </div>

  <!-- DETAIL -->
  <div class="px-5 mt-4 relative z-10">

    <div class="bg-white rounded-[26px] border border-slate-100 shadow-md p-4">

      <div class="flex items-center justify-between mb-4">

        <div>

          <h3 class="text-slate-900 font-bold text-[17px]">
            Detail Absensi
          </h3>

          <p class="text-slate-400 text-[12px]">
            Data realtime server
          </p>

        </div>

        <div class="w-10 h-10 rounded-2xl bg-blue-100 flex items-center justify-center text-blue-600">
          📍
        </div>

      </div>

      <!-- DETAIL ITEM -->
      <div class="space-y-3">

        <div class="flex items-center justify-between">

          <p class="text-slate-400 text-[12px]">
            Waktu
          </p>

          <h4 class="text-slate-900 font-bold text-[14px]">
            07:01:22
          </h4>

        </div>

        <div class="flex items-center justify-between">

          <p class="text-slate-400 text-[12px]">
            Lokasi
          </p>

          <h4 class="text-blue-600 font-semibold text-[14px]">
            Dalam Radius
          </h4>

        </div>

        <div class="flex items-center justify-between">

          <p class="text-slate-400 text-[12px]">
            Status
          </p>

          <span class="bg-green-100 text-green-700 px-3 py-1 rounded-xl text-[11px] font-semibold">
            Hadir
          </span>

        </div>

      </div>

    </div>

  </div>

  <!-- SUBMIT -->
  <div class="px-5 mt-4 relative z-10">

    <button class="w-full bg-gradient-to-r from-blue-600 to-blue-500 text-white py-4 rounded-[24px] font-bold text-[17px] shadow-xl shadow-blue-500/30 flex items-center justify-center gap-3">

      Konfirmasi Absensi

      <span>→</span>

    </button>

  </div>

  <!-- WAVE -->
  <div class="absolute bottom-0 left-0 w-full overflow-hidden leading-none">

    <svg viewBox="0 0 500 150" preserveAspectRatio="none" class="w-full h-20">

      <path
        d="M0.00,49.98 C149.99,150.00 349.20,-49.98 500.00,49.98 L500.00,150.00 L0.00,150.00 Z"
        fill="#0f5fe8">
      </path>

      <path
        d="M0.00,70.00 C149.99,170.00 349.20,-20.00 500.00,70.00 L500.00,150.00 L0.00,150.00 Z"
        fill="#ff9f43">
      </path>

    </svg>

  </div>

</div>

</body>
</html>
