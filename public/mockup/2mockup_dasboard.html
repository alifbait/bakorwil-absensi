<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=402, initial-scale=1.0">

  <title>Dashboard Pegawai</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body{
      font-family:'Inter',sans-serif;
      background:#dfe6ef;
      display:flex;
      justify-content:center;
      margin:0;
      padding:0;
    }

    .mobile{
      width:402px;
      height:874px;
      background:linear-gradient(to bottom,#ffffff,#f8fafc);
      position:relative;
      overflow:hidden;
    }
  </style>
</head>

<body>

<div class="mobile">

  <!-- BACKGROUND -->
  <div class="absolute -top-16 -left-16 w-40 h-40 rounded-full bg-blue-100 opacity-70"></div>

  <div class="absolute top-24 right-7 grid grid-cols-4 gap-2 opacity-40">
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>

    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
  </div>

  <!-- HEADER -->
  <div class="px-5 pt-12 relative z-10">

    <div class="flex items-center justify-between">

      <div class="flex items-center gap-3">

        <div class="w-14 h-14 rounded-2xl overflow-hidden border-2 border-white shadow-md">
          <img
            src="https://i.pravatar.cc/100"
            class="w-full h-full object-cover"
          >
        </div>

        <div>

          <p class="text-slate-400 text-[13px]">
            Selamat Datang 👋
          </p>

          <h2 class="text-slate-900 font-bold text-[20px] leading-tight">
            Baiatur Ridhwan
          </h2>

          <p class="text-blue-600 text-[13px] font-medium">
            Staff Pegawai
          </p>

        </div>

      </div>

      <button class="w-12 h-12 rounded-2xl bg-white shadow-md flex items-center justify-center text-xl">
        🔔
      </button>

    </div>

  </div>

  <!-- STATUS CARD -->
  <div class="px-5 mt-6 relative z-10">

    <div class="bg-gradient-to-r from-blue-600 to-blue-500 rounded-[30px] p-5 text-white shadow-xl shadow-blue-500/30">

      <div class="flex items-center justify-between mb-5">

        <div>
          <p class="text-blue-100 text-[13px]">
            Status Kehadiran
          </p>

          <h3 class="text-[24px] font-bold">
            Hadir
          </h3>
        </div>

        <div class="bg-white/20 px-4 py-2 rounded-2xl text-[13px] font-medium">
          21 Mei 2026
        </div>

      </div>

      <div class="grid grid-cols-2 gap-4">

        <div class="bg-white/10 rounded-2xl p-4">

          <p class="text-blue-100 text-[12px] mb-1">
            Jam Masuk
          </p>

          <h4 class="text-[24px] font-bold">
            07:01
          </h4>

        </div>

        <div class="bg-white/10 rounded-2xl p-4">

          <p class="text-blue-100 text-[12px] mb-1">
            Jam Pulang
          </p>

          <h4 class="text-[24px] font-bold">
            15:10
          </h4>

        </div>

      </div>

    </div>

  </div>

  <!-- QUICK MENU -->
  <div class="px-5 mt-6 relative z-10">

    <div class="grid grid-cols-2 gap-4">

      <button class="bg-white rounded-[26px] p-5 shadow-md border border-slate-100 text-left">

        <div class="w-12 h-12 rounded-2xl bg-blue-100 flex items-center justify-center text-2xl mb-4">
          📍
        </div>

        <h3 class="text-slate-900 font-bold text-[16px]">
          Absen
          <br>
          Masuk
        </h3>

      </button>

      <button class="bg-white rounded-[26px] p-5 shadow-md border border-slate-100 text-left">

        <div class="w-12 h-12 rounded-2xl bg-orange-100 flex items-center justify-center text-2xl mb-4">
          📷
        </div>

        <h3 class="text-slate-900 font-bold text-[16px]">
          Absen
          <br>
          Pulang
        </h3>

      </button>

      <button class="bg-white rounded-[26px] p-5 shadow-md border border-slate-100 text-left">

        <div class="w-12 h-12 rounded-2xl bg-green-100 flex items-center justify-center text-2xl mb-4">
          📝
        </div>

        <h3 class="text-slate-900 font-bold text-[16px]">
          Izin /
          <br>
          Sakit
        </h3>

      </button>

      <button class="bg-white rounded-[26px] p-5 shadow-md border border-slate-100 text-left">

        <div class="w-12 h-12 rounded-2xl bg-purple-100 flex items-center justify-center text-2xl mb-4">
          📋
        </div>

        <h3 class="text-slate-900 font-bold text-[16px]">
          Riwayat
          <br>
          Absensi
        </h3>

      </button>

    </div>

  </div>

  <!-- GPS STATUS -->
  <div class="px-5 mt-5 relative z-10">

    <div class="bg-blue-50 border border-blue-100 rounded-[26px] p-4 flex items-center gap-4">

      <div class="w-14 h-14 rounded-2xl bg-blue-600 flex items-center justify-center text-white text-xl shadow-md shrink-0">
        📡
      </div>

      <div>

        <h3 class="text-slate-900 font-bold text-[17px]">
          GPS Aktif
        </h3>

        <p class="text-slate-500 text-[13px]">
          Anda berada di area kantor
        </p>

      </div>

    </div>

  </div>

  <!-- HISTORY -->
  <div class="px-5 mt-5 relative z-10">

    <div class="flex items-center justify-between mb-4">

      <h3 class="text-slate-900 font-bold text-[18px]">
        Riwayat Terakhir
      </h3>

      <button class="text-blue-600 text-[13px] font-medium">
        Lihat Semua
      </button>

    </div>

    <div class="space-y-3">

      <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 flex items-center justify-between">

        <div>
          <h4 class="text-slate-900 font-semibold text-[15px]">
            20 Mei 2026
          </h4>

          <p class="text-slate-400 text-[12px]">
            07:00 - 15:02
          </p>
        </div>

        <span class="bg-green-100 text-green-700 px-3 py-2 rounded-xl text-[12px] font-semibold">
          Hadir
        </span>

      </div>

      <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 flex items-center justify-between">

        <div>
          <h4 class="text-slate-900 font-semibold text-[15px]">
            19 Mei 2026
          </h4>

          <p class="text-slate-400 text-[12px]">
            07:20 - 15:00
          </p>
        </div>

        <span class="bg-yellow-100 text-yellow-700 px-3 py-2 rounded-xl text-[12px] font-semibold">
          Telat
        </span>

      </div>

    </div>

  </div>

  <!-- BOTTOM NAVIGATION -->
  <div class="absolute bottom-0 left-0 w-full bg-white border-t border-slate-100 px-6 py-4 flex items-center justify-between z-20">

    <button class="flex flex-col items-center gap-1 text-blue-600">
      <span class="text-xl">🏠</span>
      <span class="text-[11px] font-semibold">Home</span>
    </button>

    <button class="flex flex-col items-center gap-1 text-slate-400">
      <span class="text-xl">📍</span>
      <span class="text-[11px]">Absensi</span>
    </button>

    <button class="flex flex-col items-center gap-1 text-slate-400">
      <span class="text-xl">📝</span>
      <span class="text-[11px]">Izin</span>
    </button>

    <button class="flex flex-col items-center gap-1 text-slate-400">
      <span class="text-xl">👤</span>
      <span class="text-[11px]">Profile</span>
    </button>

  </div>

</div>

</body>
</html>
