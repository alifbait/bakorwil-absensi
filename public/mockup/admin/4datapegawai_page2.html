<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Tambah Pegawai</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body{
      font-family:'Inter',sans-serif;
      background:#eef3f8;
    }

    ::-webkit-scrollbar{
      width:8px;
    }

    ::-webkit-scrollbar-thumb{
      background:#cbd5e1;
      border-radius:20px;
    }
  </style>

</head>

<body>

<div class="flex min-h-screen">

  <!-- SIDEBAR -->
  <aside class="w-[280px] bg-white border-r border-slate-200 flex flex-col justify-between fixed left-0 top-0 h-screen">

    <div>

      <!-- LOGO -->
      <div class="px-7 py-6 border-b border-slate-100">

        <div class="flex items-center gap-4">

          <div class="w-14 h-14 rounded-3xl bg-gradient-to-br from-blue-600 to-blue-500 flex items-center justify-center text-white text-2xl shadow-lg shadow-blue-500/20">
            🏢
          </div>

          <div>

            <h1 class="text-slate-900 font-extrabold text-[20px]">
              Admin Panel
            </h1>

            <p class="text-slate-400 text-[12px]">
              Bakorwil III Malang
            </p>

          </div>

        </div>

      </div>

      <!-- MENU -->
      <div class="p-5 space-y-3">

        <button class="w-full bg-slate-50 px-5 py-4 rounded-[24px] flex items-center gap-4">
          <div class="w-12 h-12 rounded-2xl bg-white shadow-sm flex items-center justify-center text-xl">
            📊
          </div>

          <div class="text-left">
            <h3 class="text-slate-800 font-semibold text-[15px]">
              Dashboard
            </h3>

            <p class="text-slate-400 text-[12px]">
              Monitoring sistem
            </p>
          </div>
        </button>

        <button class="w-full bg-slate-50 px-5 py-4 rounded-[24px] flex items-center gap-4">
          <div class="w-12 h-12 rounded-2xl bg-white shadow-sm flex items-center justify-center text-xl">
            🕒
          </div>

          <div class="text-left">
            <h3 class="text-slate-800 font-semibold text-[15px]">
              Monitoring Absensi
            </h3>

            <p class="text-slate-400 text-[12px]">
              Data kehadiran pegawai
            </p>
          </div>
        </button>

        <button class="w-full bg-slate-50 px-5 py-4 rounded-[24px] flex items-center gap-4">
          <div class="w-12 h-12 rounded-2xl bg-white shadow-sm flex items-center justify-center text-xl">
            📝
          </div>

          <div class="text-left">
            <h3 class="text-slate-800 font-semibold text-[15px]">
              Approval Izin
            </h3>

            <p class="text-slate-400 text-[12px]">
              Persetujuan pengajuan
            </p>
          </div>
        </button>

        <!-- ACTIVE -->
        <button class="w-full bg-gradient-to-r from-blue-600 to-blue-500 text-white px-5 py-4 rounded-[24px] flex items-center gap-4 shadow-lg shadow-blue-500/20">

          <div class="w-12 h-12 rounded-2xl bg-white/20 flex items-center justify-center text-xl">
            👥
          </div>

          <div class="text-left">

            <h3 class="font-bold text-[15px]">
              Data Pegawai
            </h3>

            <p class="text-blue-100 text-[12px]">
              Master data ASN
            </p>

          </div>

        </button>

        <button class="w-full bg-slate-50 px-5 py-4 rounded-[24px] flex items-center gap-4">
          <div class="w-12 h-12 rounded-2xl bg-white shadow-sm flex items-center justify-center text-xl">
            📁
          </div>

          <div class="text-left">
            <h3 class="text-slate-800 font-semibold text-[15px]">
              Laporan
            </h3>

            <p class="text-slate-400 text-[12px]">
              Export Excel & PDF
            </p>
          </div>
        </button>

        <button class="w-full bg-slate-50 px-5 py-4 rounded-[24px] flex items-center gap-4">
          <div class="w-12 h-12 rounded-2xl bg-white shadow-sm flex items-center justify-center text-xl">
            ⚙️
          </div>

          <div class="text-left">
            <h3 class="text-slate-800 font-semibold text-[15px]">
              Setting
            </h3>

            <p class="text-slate-400 text-[12px]">
              Konfigurasi sistem
            </p>
          </div>
        </button>

      </div>

    </div>

    <!-- LOGOUT -->
    <div class="p-5 border-t border-slate-100">

      <button class="w-full bg-red-500 hover:bg-red-600 transition text-white py-4 rounded-[24px] font-bold text-[15px]">
        Logout
      </button>

    </div>

  </aside>

  <!-- MAIN -->
  <main class="ml-[280px] flex-1 p-8">

    <!-- TOP -->
    <div class="flex items-center justify-between mb-8">

      <div>

        <p class="text-slate-400 text-[14px] mb-1">
          Master Data ASN
        </p>

        <h1 class="text-[52px] font-extrabold text-slate-900 leading-none">
          Tambah Pegawai
        </h1>

      </div>

      <!-- PROFILE -->
      <div class="bg-white border border-slate-200 rounded-[28px] px-5 py-4 flex items-center gap-4 shadow-sm">

        <img
          src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?q=80&w=1200&auto=format&fit=crop"
          class="w-16 h-16 rounded-2xl object-cover"
        >

        <div>

          <h3 class="text-slate-900 font-bold text-[18px]">
            Admin Utama
          </h3>

          <p class="text-slate-400 text-[13px]">
            Super Administrator
          </p>

        </div>

      </div>

    </div>

    <!-- CONTENT -->
    <div class="grid grid-cols-3 gap-7">

      <!-- LEFT -->
      <div class="col-span-2 space-y-7">

        <!-- PERSONAL -->
        <div class="bg-white rounded-[32px] p-8 shadow-sm border border-slate-100">

          <h2 class="text-[30px] font-extrabold text-slate-900 mb-1">
            Informasi Personal
          </h2>

          <p class="text-slate-400 text-[14px] mb-8">
            Data identitas pegawai ASN
          </p>

          <div class="grid grid-cols-2 gap-5">

            <div>
              <label class="text-[14px] font-semibold text-slate-700 block mb-3">
                Nama Lengkap
              </label>

              <input
                type="text"
                placeholder="Masukkan nama lengkap"
                class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 outline-none"
              >
            </div>

            <div>
              <label class="text-[14px] font-semibold text-slate-700 block mb-3">
                NIP
              </label>

              <input
                type="text"
                placeholder="Masukkan NIP"
                class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 outline-none"
              >
            </div>

            <div>
              <label class="text-[14px] font-semibold text-slate-700 block mb-3">
                Email
              </label>

              <input
                type="email"
                placeholder="pegawai@email.com"
                class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 outline-none"
              >
            </div>

            <div>
              <label class="text-[14px] font-semibold text-slate-700 block mb-3">
                No HP
              </label>

              <input
                type="text"
                placeholder="08xxxxxxxxxx"
                class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 outline-none"
              >
            </div>

            <div class="col-span-2">

              <label class="text-[14px] font-semibold text-slate-700 block mb-3">
                Alamat
              </label>

              <textarea
                rows="4"
                placeholder="Masukkan alamat lengkap..."
                class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 outline-none resize-none"
              ></textarea>

            </div>

          </div>

        </div>

        <!-- KEPEGAWAIAN -->
        <div class="bg-white rounded-[32px] p-8 shadow-sm border border-slate-100">

          <h2 class="text-[30px] font-extrabold text-slate-900 mb-1">
            Informasi Kepegawaian
          </h2>

          <p class="text-slate-400 text-[14px] mb-8">
            Data jabatan dan status pegawai
          </p>

          <div class="grid grid-cols-2 gap-5">

            <div>

              <label class="text-[14px] font-semibold text-slate-700 block mb-3">
                Jabatan
              </label>

              <select class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 outline-none">

                <option>Pilih Jabatan</option>
                <option>Staff ASN</option>
                <option>Kepala Divisi</option>

              </select>

            </div>

            <div>

              <label class="text-[14px] font-semibold text-slate-700 block mb-3">
                Divisi
              </label>

              <select class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 outline-none">

                <option>Pilih Divisi</option>
                <option>Kepegawaian</option>
                <option>Administrasi</option>

              </select>

            </div>

            <div>

              <label class="text-[14px] font-semibold text-slate-700 block mb-3">
                Role Akun
              </label>

              <select class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 outline-none">

                <option>User</option>
                <option>Admin</option>

              </select>

            </div>

            <div>

              <label class="text-[14px] font-semibold text-slate-700 block mb-3">
                Status Akun
              </label>

              <select class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 outline-none">

                <option>Aktif</option>
                <option>Nonaktif</option>

              </select>

            </div>

          </div>

        </div>

      </div>

      <!-- RIGHT -->
      <div class="space-y-7">

        <!-- FOTO -->
        <div class="bg-white rounded-[32px] p-8 shadow-sm border border-slate-100">

          <h2 class="text-[28px] font-extrabold text-slate-900 mb-1">
            Foto Pegawai
          </h2>

          <p class="text-slate-400 text-[14px] mb-8">
            Upload foto profil ASN
          </p>

          <div class="border-2 border-dashed border-slate-200 rounded-[28px] p-8 text-center">

            <img
              src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?q=80&w=1200&auto=format&fit=crop"
              class="w-36 h-36 rounded-[30px] object-cover mx-auto mb-5"
            >

            <button class="bg-blue-600 hover:bg-blue-700 transition text-white px-6 py-3 rounded-2xl font-bold text-[14px]">
              Upload Foto
            </button>

          </div>

        </div>

        <!-- LOGIN -->
        <div class="bg-white rounded-[32px] p-8 shadow-sm border border-slate-100">

          <h2 class="text-[28px] font-extrabold text-slate-900 mb-1">
            Akun Login
          </h2>

          <p class="text-slate-400 text-[14px] mb-8">
            Informasi login pegawai
          </p>

          <div class="space-y-5">

            <div>

              <label class="text-[14px] font-semibold text-slate-700 block mb-3">
                Username
              </label>

              <input
                type="text"
                placeholder="username"
                class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 outline-none"
              >

            </div>

            <div>

              <label class="text-[14px] font-semibold text-slate-700 block mb-3">
                Password Default
              </label>

              <input
                type="password"
                placeholder="••••••••"
                class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 outline-none"
              >

            </div>

            <button class="w-full bg-orange-500 hover:bg-orange-600 transition text-white py-4 rounded-2xl font-bold">
              Reset Password
            </button>

          </div>

        </div>

        <!-- ACTION -->
        <div class="bg-white rounded-[32px] p-8 shadow-sm border border-slate-100">

          <div class="space-y-4">

            <button class="w-full bg-blue-600 hover:bg-blue-700 transition text-white py-4 rounded-2xl font-bold text-[15px] shadow-lg shadow-blue-500/20">
              Simpan Pegawai
            </button>

            <button class="w-full bg-slate-100 hover:bg-slate-200 transition text-slate-700 py-4 rounded-2xl font-bold text-[15px]">
              Reset Form
            </button>

            <button class="w-full bg-red-500 hover:bg-red-600 transition text-white py-4 rounded-2xl font-bold text-[15px]">
              Kembali
            </button>

          </div>

        </div>

      </div>

    </div>

  </main>

</div>

</body>
</html>
