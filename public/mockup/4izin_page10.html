<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=402, initial-scale=1.0">

  <title>Pengajuan Izin / Sakit</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body{
      font-family:'Inter',sans-serif;
      background:#dfe6ef;
      display:flex;
      justify-content:center;
      margin:0;
      padding:0;
    }

    .mobile{
      width:402px;
      height:874px;
      background:linear-gradient(to bottom,#ffffff,#f8fafc);
      position:relative;
      overflow:hidden;
    }
  </style>
</head>

<body>

<div class="mobile">

  <!-- BG -->
  <div class="absolute -top-16 -left-16 w-40 h-40 rounded-full bg-blue-100 opacity-70"></div>

  <div class="absolute top-24 right-7 grid grid-cols-4 gap-2 opacity-40">
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>

    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
    <span class="w-2 h-2 rounded-full bg-blue-300"></span>
  </div>

  <!-- HEADER -->
  <div class="px-5 pt-10 relative z-10">

    <div class="flex items-center gap-3">

      <button class="w-11 h-11 rounded-2xl bg-white shadow-md flex items-center justify-center text-lg">
        ←
      </button>

      <div>

        <p class="text-slate-400 text-[11px]">
          Pengajuan Kehadiran
        </p>

        <h2 class="text-slate-900 font-bold text-[21px]">
          Izin / Sakit
        </h2>

      </div>

    </div>

  </div>

  <!-- FORM -->
  <div class="px-5 mt-4 relative z-10">

    <div class="bg-white rounded-[26px] border border-slate-100 shadow-lg p-4">

      <!-- TYPE -->
      <div class="mb-4">

        <label class="block text-slate-900 font-semibold text-[14px] mb-2">
          Jenis Pengajuan
        </label>

        <div class="grid grid-cols-2 gap-3">

          <button class="bg-gradient-to-r from-blue-600 to-blue-500 text-white py-3 rounded-2xl font-bold text-[14px] shadow-lg shadow-blue-500/20">
            Izin
          </button>

          <button class="bg-slate-100 text-slate-600 py-3 rounded-2xl font-semibold text-[14px]">
            Sakit
          </button>

        </div>

      </div>

      <!-- DATE -->
      <div class="mb-4">

        <label class="block text-slate-900 font-semibold text-[14px] mb-2">
          Tanggal
        </label>

        <div class="bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 flex items-center justify-between">

          <div>

            <p class="text-slate-900 font-semibold text-[13px]">
              21 Mei 2026
            </p>

            <p class="text-slate-400 text-[11px]">
              Pilih tanggal
            </p>

          </div>

          <span class="text-lg">
            📅
          </span>

        </div>

      </div>

      <!-- TEXTAREA -->
      <div class="mb-4">

        <label class="block text-slate-900 font-semibold text-[14px] mb-2">
          Alasan
        </label>

        <textarea
          rows="3"
          placeholder="Masukkan alasan pengajuan..."
          class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-[13px] resize-none focus:outline-none focus:ring-4 focus:ring-blue-100"
        ></textarea>

      </div>

      <!-- UPLOAD -->
      <div>

        <label class="block text-slate-900 font-semibold text-[14px] mb-2">
          Upload Bukti
        </label>

        <div class="border-2 border-dashed border-slate-300 rounded-[24px] p-4 text-center bg-slate-50">

          <div class="w-12 h-12 rounded-2xl bg-blue-100 flex items-center justify-center text-2xl text-blue-600 mx-auto mb-3">
            📄
          </div>

          <h3 class="text-slate-900 font-bold text-[14px] mb-1">
            Upload File
          </h3>

          <p class="text-slate-400 text-[11px] mb-3">
            PDF, JPG, PNG
          </p>

          <button class="bg-blue-600 text-white px-5 py-2.5 rounded-2xl text-[12px] font-semibold shadow-lg shadow-blue-500/20">
            Pilih File
          </button>

        </div>

      </div>

    </div>

  </div>

  <!-- INFO -->
  <div class="px-5 mt-4 relative z-10">

    <div class="bg-blue-50 border border-blue-100 rounded-[22px] p-3 flex items-start gap-3">

      <div class="w-10 h-10 rounded-2xl bg-blue-600 flex items-center justify-center text-white text-sm shrink-0">
        ℹ️
      </div>

      <div>

        <h3 class="text-slate-900 font-bold text-[14px] mb-1">
          Menunggu Verifikasi
        </h3>

        <p class="text-slate-500 text-[11px] leading-relaxed">
          Pengajuan akan diperiksa admin terlebih dahulu.
        </p>

      </div>

    </div>

  </div>

  <!-- BUTTON -->
  <div class="px-5 mt-4 relative z-10">

    <button class="w-full bg-gradient-to-r from-blue-600 to-blue-500 text-white py-4 rounded-[24px] font-bold text-[16px] shadow-xl shadow-blue-500/20 flex items-center justify-center gap-3">

      Ajukan Sekarang

      <span>→</span>

    </button>

  </div>

  <!-- WAVE -->
  <div class="absolute bottom-0 left-0 w-full overflow-hidden leading-none">

    <svg viewBox="0 0 500 150" preserveAspectRatio="none" class="w-full h-12">

      <path
        d="M0.00,49.98 C149.99,150.00 349.20,-49.98 500.00,49.98 L500.00,150.00 L0.00,150.00 Z"
        fill="#0f5fe8">
      </path>

      <path
        d="M0.00,70.00 C149.99,170.00 349.20,-20.00 500.00,70.00 L500.00,150.00 L0.00,150.00 Z"
        fill="#ff9f43">
      </path>

    </svg>

  </div>

</div>

</body>
</html>
